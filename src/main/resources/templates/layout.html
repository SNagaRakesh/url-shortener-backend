<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultrag.net.nz/thymeleaf/layout" lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>URL Shortener</title>

    <!--     Bootstrap CSS CDN-->
<!--        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"-->
<!--              rel="stylesheet"-->
<!--              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"-->
<!--              crossorigin="anonymous">-->

<!--    Bootstrap CSS WebJars-->

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">

</head>
<body>

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand" th:href="@{/}">URL Shortener</a>

        <!-- Toggle Button -->
        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent"
                aria-controls="navbarContent"
                aria-expanded="false"
                aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Content -->
        <div class="collapse navbar-collapse" id="navbarContent">

            <!-- Left Side Links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="#">My URLs</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Admin Dashboard</a>
                </li>

            </ul>

            <!-- Right Side Links -->
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Register</a>
                </li>

            </ul>

        </div>
    </div>
</nav>
<!-- Navbar End -->


<!-- Main Body Section -->
<div class="container" style="margin-top: 90px;">

    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show"
         role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close"
                data-bs-dismiss="alert" aria-label="Close">
        </button>
    </div>

    <!-- Your page content goes here -->
    <div layout:fragment="content">
        <!--page content here-->
    </div>

</div>


<!-- Bootstrap JS CDN-->

<!--        crossorigin="anonymous">-->
<!--</script>-->

<!--Bootstrap JS WebJars-->

<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>


</body>
</html>
